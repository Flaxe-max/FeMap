<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Rota — GPS Rota Takip</title>
<meta name="description" content="GPS ile rota çizin, mesafe ve süre takibi yapın, rotalarınızı kaydedin." />
<meta name="theme-color" id="meta-theme-color" content="#0B0F17" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="js/leaflet/leaflet.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- Tab bar -->
  <header class="tabbar" role="tablist">
    <button class="tab active" data-tab="map" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l-5 2V6l5-2m0 14l6 2m-6-2V4m6 16l5-2V4l-5 2m0 14V6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="tab-label-map">Harita</span>
    </button>
    <button class="tab" data-tab="saved" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16l-7-4-7 4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="tab-label-saved">Kaydedilenler</span>
      <span class="tab-count" id="saved-count" hidden>0</span>
    </button>
    <button class="tab" data-tab="settings" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="tab-label-settings">Ayarlar</span>
    </button>
  </header>

  <!-- HARİTA GÖRÜNÜMÜ -->
  <section id="view-map" class="view active">
    <div id="map"></div>

    <div id="stats-chip" class="stats-chip" hidden>
      <span class="rec-dot"></span>
      <span class="stat-time" id="stat-time">00:00:00</span>
      <span class="stat-sep">·</span>
      <span class="stat-dist" id="stat-dist">0.00 km</span>
    </div>

    <div id="dest-banner" class="dest-banner" hidden>
      <svg viewBox="0 0 24 24" fill="none" style="width:16px;height:16px;flex-shrink:0"><circle cx="12" cy="12" r="3" stroke="#2FD6B3" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#2FD6B3" stroke-width="2" stroke-linecap="round"/></svg>
      <span id="dest-banner-text">Haritada varış noktasını seçin</span>
      <button id="dest-cancel" class="link-btn">vazgeç</button>
    </div>

    <div class="controls">
      <button id="dest-btn" class="ghost-btn" title="Varış noktası belirle">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 21V4m0 0h11l-2.5 3.5L17 11H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="dest-btn-label">Varış Noktası</span>
      </button>

      <button id="record-btn" class="record-btn" aria-label="Başlat">
        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-stop" viewBox="0 0 24 24" fill="currentColor" hidden><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>

      <div class="controls-spacer"></div>
    </div>
  </section>

  <!-- KAYDEDİLENLER GÖRÜNÜMÜ -->
  <section id="view-saved" class="view">
    <div class="saved-header">
      <h1 id="saved-title">Kaydedilen Rotalar</h1>
    </div>
    <div id="saved-list" class="saved-list"></div>
    <div id="saved-empty" class="empty-state" hidden>
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l-5 2V6l5-2m0 14l6 2m-6-2V4m6 16l5-2V4l-5 2m0 14V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p id="saved-empty-text">Henüz kayıtlı rotan yok.</p>
      <p class="empty-sub" id="saved-empty-sub">Haritada kayıt butonuna basarak ilk rotanı oluştur.</p>
    </div>
  </section>

  <!-- AYARLAR GÖRÜNÜMÜ — JS tarafından doldurulur -->
  <section id="view-settings" class="view settings-view"></section>

</div>

<!-- Kaydetme alt paneli -->
<div id="save-sheet" class="sheet-backdrop" hidden>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheet-title">Rota Tamamlandı 🎯</h2>
    <div class="sheet-summary">
      <span id="sheet-dist">0.00 km</span>
      <span class="stat-sep">·</span>
      <span id="sheet-time">00:00:00</span>
    </div>
    <label class="field-label" for="route-name" id="route-name-label">Rota adı</label>
    <input id="route-name" type="text" placeholder="ör. Ev Yolu" maxlength="40" autocomplete="off" />
    <div class="color-row" id="color-row"></div>
    <div class="sheet-actions">
      <button id="discard-route" class="text-btn">Kaydetme</button>
      <button id="confirm-save" class="primary-btn">Kaydet</button>
    </div>
  </div>
</div>

<!-- Rota önizleme -->
<div id="preview-bar" class="preview-bar" hidden>
  <span id="preview-name"></span>
  <span class="stat-sep">·</span>
  <span id="preview-meta"></span>
  <button id="preview-close" class="link-btn">kapat</button>
</div>

<!-- Geliştirici Şifre Modalı -->
<div id="pw-modal" class="pw-backdrop" hidden>
  <div class="pw-dialog">
    <div class="pw-lock-icon">🔒</div>
    <h3 class="pw-title" id="pw-title-text">Geliştirici Erişimi</h3>
    <p class="pw-desc" id="pw-desc-text">Bu özellik yalnızca geliştiriciler içindir.</p>
    <input id="pw-input" type="password" class="pw-input" placeholder="Şifreyi girin" autocomplete="off" maxlength="30" />
    <p id="pw-error" class="pw-error" hidden>Yanlış şifre</p>
    <div class="pw-actions">
      <button id="pw-cancel" class="text-btn">İptal</button>
      <button id="pw-enter" class="primary-btn">Giriş</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="js/leaflet/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
